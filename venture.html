    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; color: #0f172a; }
    a { text-decoration: none; }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 48px; background: #fff;
      border-bottom: 1px solid #f1f5f9;
    }
    .logo { display: flex; align-items: center; gap: 10px; color: #0f172a; font-size: 18px; font-weight: 700; }
    .logo-box {
      width: 34px; height: 34px; background: #2563eb;
      border-radius: 7px; display: grid; place-items: center; flex-shrink: 0;
    }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a { color: #0f172a; font-size: 14px; font-weight: 500; }
    .nav-links a:hover, .nav-links a.active { color: #2563eb; }

    /* ── PAGE HEADER ── */
    .page-header { background: #e8f0fe; padding: 64px 20px; text-align: center; }
    .page-header h1 { font-size: 46px; font-weight: 800; color: #0f172a; }

    /* ── COIN GRID ── */
    .coins { max-width: 820px; margin: 0 auto; padding: 64px 20px 80px; }
    .coin-row {
      display: flex; justify-content: center; align-items: center;
      gap: 28px; flex-wrap: wrap; margin-bottom: 36px;
    }
    .coin {
      width: 82px; height: 82px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      background: #f1f5f9;
    }
    .coin img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── FOOTER ── */
    footer { background: #0a0a0a; color: rgba(255,255,255,.45); padding: 28px; text-align: center; font-size: 13px; }

    @media (max-width: 640px) {
      nav { padding: 18px 20px; }
      .nav-links { gap: 16px; }
      .coin { width: 60px; height: 60px; }
      .coin-row { gap: 18px; }
    }
  </style>
</head>
