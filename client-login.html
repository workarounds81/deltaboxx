<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investor Login — DeltaBoxx</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; color: #1a1a2e; background: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; color: inherit; }
    :root { --burgundy: #722F37; --slate: #2D3436; --bg: #f8f6f3; --border: #e8e4df; --text: #1a1a2e; --muted: #5a5a6e; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 60px; background: #fff; border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-text { font-size: 17px; font-weight: 700; letter-spacing: 3px; color: var(--burgundy); text-transform: uppercase; }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a { font-size: 13px; font-weight: 500; color: #636e72; padding: 6px 0; border-bottom: 2px solid transparent; transition: all .2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--burgundy); border-bottom-color: var(--burgundy); }

    .motto { background: var(--burgundy); color: rgba(255,255,255,.85); text-align: center; padding: 13px 20px; font-size: 11px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; }

    .login-section { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; background: var(--bg); }
    .login-card {
      background: #fff; border-radius: 8px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 32px rgba(0,0,0,0.06);
      padding: 52px 48px; width: 100%; max-width: 440px;
    }
    .login-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--burgundy); margin-bottom: 14px; }
    .login-card h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .login-card .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 36px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; letter-spacing: 0.5px; }
    .form-group input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid var(--border); border-radius: 4px;
      font-size: 15px; font-family: inherit; color: var(--text);
      outline: none; transition: border-color .15s; background: #fff;
    }
    .form-group input:focus { border-color: var(--burgundy); }

    .btn-login {
      width: 100%; padding: 14px;
      background: var(--burgundy); color: #fff;
      border: none; border-radius: 4px;
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; margin-top: 8px; letter-spacing: 1px;
      text-transform: uppercase; transition: background .2s;
    }
    .btn-login:hover { background: #5d2730; }
    .btn-login:disabled { background: #c4828a; cursor: not-allowed; }
    #msg { margin-top: 16px; font-size: 13px; text-align: center; min-height: 20px; color: #dc2626; }
    #msg.success { color: #16a34a; }

    footer { background: var(--slate); color: rgba(255,255,255,.45); padding: 28px; text-align: center; font-size: 13px; }

    @media (max-width: 960px) {
      nav { padding: 16px 24px; } .nav-links { gap: 16px; }
      .login-card { padding: 36px 28px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="5" fill="#722F37"/>
      <path d="M18 7L30 29H6Z" stroke="white" stroke-width="2.2" fill="none" stroke-linejoin="round"/>
      <path d="M18 14L25 28H11Z" stroke="white" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
    </svg>
    <span class="logo-text">DeltaBoxx</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="index.html#framework">Investment Framework</a></li>
    <li><a href="venture.html">Portfolio</a></li>
    <li><a href="news.html">News</a></li>
    <li><a href="client-login.html" class="active">Investor Login</a></li>
  </ul>
</nav>

<div class="motto">Infrastructure First. Everything Else Follows.</div>

<div class="login-section">
  <div class="login-card">
    <p class="login-eyebrow">Investor Portal</p>
    <h2>Sign In</h2>
    <p class="subtitle">Access your DeltaBoxx investment dashboard.</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
    </form>
    <p id="msg"></p>
  </div>
</div>

<footer>Copyright &copy; 2024 DeltaBoxx. All rights reserved.</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL  = 'https://qubwootdatrbpyipkrvw.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_soPXNzg_s8aLgyi6bsQEXw_sRpOEzZU';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const msg = document.getElementById('msg');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    btn.disabled = true; btn.textContent = 'Signing in…';
    msg.textContent = ''; msg.className = '';
    const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
    if (error) {
      msg.textContent = error.message; btn.disabled = false; btn.textContent = 'Sign In';
    } else {
      msg.textContent = 'Login successful! Redirecting…'; msg.className = 'success';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    }
  });
</script>
</body>
</html>
