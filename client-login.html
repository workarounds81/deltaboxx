<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Login — DeltaBoxx</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 48px; background: #fff;
      border-bottom: 1px solid #f1f5f9;
    }
    .logo { display: flex; align-items: center; gap: 10px; color: #0f172a; font-size: 18px; font-weight: 700; }
    .logo-box {
      width: 34px; height: 34px; background: #2563eb;
      border-radius: 7px; display: grid; place-items: center; flex-shrink: 0;
    }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a { color: #0f172a; font-size: 14px; font-weight: 500; }
    .nav-links a:hover, .nav-links a.active { color: #2563eb; }

    /* ── LOGIN SECTION ── */
    .login-section {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 60px 20px; background: #f8fafc;
    }
    .login-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px; width: 100%; max-width: 420px;
    }
    .login-card h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .login-card .subtitle { font-size: 14px; color: #64748b; margin-bottom: 32px; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 15px; font-family: inherit; color: #0f172a;
      outline: none; transition: border-color .15s;
    }
    .form-group input:focus { border-color: #2563eb; }

    .btn-login {
      width: 100%; padding: 13px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; margin-top: 8px;
    }
    .btn-login:hover { background: #1d4ed8; }
    .btn-login:disabled { background: #93c5fd; cursor: not-allowed; }

    #msg {
      margin-top: 16px; font-size: 14px; text-align: center;
      min-height: 20px; color: #ef4444;
    }
    #msg.success { color: #16a34a; }

    /* ── FOOTER ── */
    footer { background: #0a0a0a; color: rgba(255,255,255,.45); padding: 28px; text-align: center; font-size: 13px; }

    @media (max-width: 640px) {
      nav { padding: 18px 20px; }
      .nav-links { gap: 16px; }
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <div class="logo-box">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="2" width="14" height="14" rx="2" stroke="white" stroke-width="2"/>
        <path d="M9 5v8M5 9h8" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    DeltaBoxx
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="venture.html">Venture</a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="client-login.html" class="active">Client Login</a></li>
  </ul>
</nav>

<div class="login-section">
  <div class="login-card">
    <h2>Client Login</h2>
    <p class="subtitle">Sign in to access your DeltaBoxx dashboard.</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
    </form>

    <p id="msg"></p>
  </div>
</div>

<footer>Copyright &copy; 2024 DeltaBoxx. All rights reserved.</footer>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── REPLACE THESE WITH YOUR DELTABOXX SUPABASE PROJECT CREDENTIALS ──
  const SUPABASE_URL  = 'https://qubwootdatrbpyipkrvw.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_soPXNzg_s8aLgyi6bsQEXw_sRpOEzZU';
  // ────────────────────────────────────────────────────────────────────

  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const msg = document.getElementById('msg');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    msg.textContent = '';
    msg.className = '';

    const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

    if (error) {
      msg.textContent = error.message;
      msg.className = '';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    } else {
      msg.textContent = 'Login successful! Redirecting…';
      msg.className = 'success';
      // Redirect to your dashboard page after login
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    }
  });
</script>

</body>
</html>
